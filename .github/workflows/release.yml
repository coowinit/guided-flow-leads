name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: vars
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare package folder
        run: |
          mkdir -p dist/guided-flow-leads
          rsync -av ./ dist/guided-flow-leads/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude 'node_modules' \
            --exclude '*.zip'

      - name: Create zip package
        run: |
          cd dist
          zip -r "guided-flow-leads-${{ steps.vars.outputs.version }}.zip" guided-flow-leads

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: guided-flow-leads-${{ steps.vars.outputs.version }}
          path: dist/guided-flow-leads-${{ steps.vars.outputs.version }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/guided-flow-leads-${{ steps.vars.outputs.version }}.zip